<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motivación Veterinaria</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="title">¡Hola, futura veterinaria! 🐶🐱</h1>
        <div class="message">
            <p class="text">Eres increíble y tienes un corazón enorme para cuidar de los animales.</p>
            <p class="text">¡Sigue estudiando, porque el mundo necesita más héroes como tú!</p>
            <p class="text">Cada día que estudias, salvas vidas peludas. ¡No te rindas nunca! 💪</p>
        </div>
        <div class="animals">
            <div class="animal dog">🐕</div>
            <div class="animal cat">🐈</div>
            <div class="animal bird">🐦</div>
            <div class="animal rabbit">🐰</div>
        </div>
        <div class="heart">❤️</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
